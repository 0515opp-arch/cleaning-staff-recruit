<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>応募ありがとうございます｜木更津の民泊 清掃スタッフ募集</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#3A8E7C">
<style>
:root{--green:#3A8E7C;--green-dk:#27695B;--green-lt:#E6F2EE;--ink:#2c2c2c;--gray:#5A5A5A;--bg:#F4F8F5}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;
  background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.8}
.box{max-width:440px;width:100%;background:#fff;border:2px solid var(--green);border-radius:20px;
  padding:40px 28px;text-align:center;box-shadow:0 6px 24px rgba(39,105,91,.1)}
.chk{font-size:54px;margin-bottom:12px}
h1{font-size:22px;font-weight:800;color:var(--green-dk);margin-bottom:12px}
p{font-size:14px;color:var(--gray);margin-bottom:8px}
.tel{display:inline-flex;align-items:center;gap:8px;background:var(--green);color:#fff;text-decoration:none;
  font-weight:800;font-size:20px;padding:12px 22px;border-radius:12px;margin-top:18px;letter-spacing:1px}
.meta{font-size:12px;margin-top:10px}
.back{display:inline-block;margin-top:22px;color:var(--green);font-size:13px;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="box">
  <div class="chk">🌱</div>
  <h1>応募ありがとうございます！</h1>

  <p>お急ぎの場合はお電話でもどうぞ。</p>
  <a class="tel" href="tel:070-2294-0290">📞 070-2294-0290</a>
  <p class="meta">受付 10:00〜19:00 / 担当：原（OPP）</p>
  <a class="back" href="./">← 募集ページに戻る</a>
</div>
</body>
</html>
